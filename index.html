<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="music." />
  <title>music.</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --accent: #c8f058;
      --accent2: #58f0c8;
      --text: #f0f0f0;
      --muted: #666666;
      --player-h: 88px;
      --nav-h: 60px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    .screen {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--player-h) + var(--nav-h) + 12px);
      padding-top: env(safe-area-inset-top, 0);
    }
    .screen.active { display: block; }

    /* ── Header ── */
    .header {
      padding: 28px 20px 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .header h1 span { color: var(--accent); }
    .header-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    /* ── Track List ── */
    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: background 0.15s;
    }
    .track-item:active { background: var(--surface); }
    .track-item.playing { background: var(--surface); }
    .track-item.playing::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .track-thumb {
      width: 50px; height: 50px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }
    .track-thumb-placeholder {
      width: 50px; height: 50px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-item.playing .track-title { color: var(--accent); }
    .track-artist {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }
    .track-duration {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .playing-bars {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
      flex-shrink: 0;
    }
    .track-item.playing .playing-bars { display: flex; }
    .playing-bars span {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: bar 0.8s ease-in-out infinite alternate;
    }
    .playing-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .playing-bars span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
    .playing-bars span:nth-child(3) { height: 8px; animation-delay: 0.4s; }
    @keyframes bar { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }

    /* ── State boxes ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      text-align: center;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── Mini Player ── */
    #mini-player {
      position: fixed;
      bottom: var(--nav-h);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--player-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
    }
    #mini-player.visible { display: flex; }

    #mini-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
    }
    #mini-info { flex: 1; min-width: 0; }
    #mini-title {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--accent);
    }
    #mini-artist {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .ctrl-btn:active { background: var(--surface2); }
    .ctrl-btn svg { width: 22px; height: 22px; }
    #play-pause-btn {
      background: var(--accent);
      color: #000;
      width: 42px; height: 42px;
    }
    #play-pause-btn:active { background: var(--accent2); }

    /* ── Bottom Nav ── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 101;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 20px; height: 20px; }

    /* ── Analytics ── */
    .analytics-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .analytics-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .analytics-header h1 span { color: var(--accent); }

    .stat-card {
      margin: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .stat-card-value {
      font-size: 48px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-top: 8px;
      letter-spacing: -2px;
    }
    .stat-card-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .section-title {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 20px;
      margin-bottom: 8px;
    }

    .chart-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
    }
    .chart-rank {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }
    .chart-bar-wrap { flex: 1; }
    .chart-bar-label {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chart-bar-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .chart-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .chart-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .refresh-btn {
      display: block;
      margin: 20px auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 28px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .empty-analytics {
      text-align: center;
      padding: 40px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Library Screen -->
  <div id="screen-library" class="screen active">
    <div class="header">
      <h1>music<span>.</span></h1>
      <div class="header-sub" id="track-count">loading library...</div>
    </div>
    <div id="track-list"></div>
  </div>

  <!-- Analytics Screen -->
  <div id="screen-analytics" class="screen">
    <div class="analytics-header">
      <h1>stats<span>.</span></h1>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">plays this month</div>
      <div class="stat-card-value" id="total-plays">0</div>
      <div class="stat-card-sub" id="month-label">—</div>
    </div>
    <div class="section-title">most played</div>
    <div id="chart-list"></div>
    <button class="refresh-btn" onclick="renderAnalytics()">↺ refresh</button>
  </div>

  <!-- Mini Player -->
  <div id="mini-player">
    <img id="mini-thumb" src="" alt="" />
    <div id="mini-info">
      <div id="mini-title">—</div>
      <div id="mini-artist">—</div>
    </div>
    <button class="ctrl-btn" onclick="playPrev()" title="Previous">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlay()" title="Play/Pause">
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="ctrl-btn" onclick="playNext()" title="Next">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.47 3.86L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
    </button>
  </div>

  <!-- Bottom Nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-library" onclick="showScreen('library')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      library
    </button>
    <button class="nav-btn" id="nav-analytics" onclick="showScreen('analytics')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
      analytics
    </button>
  </nav>

</div>

<audio id="audio-player"></audio>

<script>
  // ── Config — update these to match your GitHub ──────────────────────────────
  const GH_USER    = 'MEHUL-NS';           // your GitHub username
  const GH_REPO    = 'music-library';      // your music repo name
  const GH_RELEASE = 'music-library';      // your release tag name

  // ── State ────────────────────────────────────────────────────────────────────
  let tracks = [];
  let currentIndex = -1;
  const audio = document.getElementById('audio-player');

  // ── Screens ──────────────────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`screen-${name}`).classList.add('active');
    document.getElementById(`nav-${name}`).classList.add('active');
    if (name === 'analytics') renderAnalytics();
  }

  // ── Load Tracks from GitHub Releases ─────────────────────────────────────────
  async function loadTracks() {
    const list = document.getElementById('track-list');
    list.innerHTML = `<div class="state-box"><div class="spinner"></div><span>fetching library...</span></div>`;

    try {
      // Step 1: get the release metadata to find catalog.json asset
      const releaseRes = await fetch(
        `https://api.github.com/repos/${GH_USER}/${GH_REPO}/releases/tags/${GH_RELEASE}`,
        { headers: { 'Accept': 'application/vnd.github+json' } }
      );
      if (!releaseRes.ok) throw new Error(`GitHub API ${releaseRes.status}`);
      const release = await releaseRes.json();

      const catalogAsset = (release.assets || []).find(a => a.name === 'catalog.json');
      if (!catalogAsset) throw new Error('catalog.json not found in release assets. Run ingest.py first.');

      // Step 2: download catalog.json using the asset API (handles redirect correctly)
      const catalogRes = await fetch(catalogAsset.url, {
        headers: {
          'Accept': 'application/octet-stream',
        }
      });
      if (!catalogRes.ok) throw new Error(`catalog download failed (${catalogRes.status})`);

      const data = await catalogRes.json();
      tracks = data.tracks || [];

      document.getElementById('track-count').textContent =
        `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
      renderTrackList();

    } catch (e) {
      list.innerHTML = `
        <div class="state-box">
          <span>couldn't load library</span>
          <span style="font-size:11px;color:#444">${e.message}</span>
          <button class="retry-btn" onclick="loadTracks()">retry</button>
        </div>`;
      document.getElementById('track-count').textContent = 'error loading';
    }
  }

  function renderTrackList() {
    const list = document.getElementById('track-list');
    if (!tracks.length) {
      list.innerHTML = `<div class="state-box"><span>no tracks found</span></div>`;
      return;
    }
    list.innerHTML = tracks.map((t, i) => `
      <div class="track-item ${i === currentIndex ? 'playing' : ''}" onclick="playTrack(${i})">
        ${t.thumbnail
          ? `<img class="track-thumb" src="${escHtml(t.thumbnail)}" alt="" loading="lazy"
               onerror="this.outerHTML='<div class=track-thumb-placeholder>🎵</div>'" />`
          : `<div class="track-thumb-placeholder">🎵</div>`
        }
        <div class="track-info">
          <div class="track-title">${escHtml(t.title)}</div>
          <div class="track-artist">${escHtml(t.artist || 'unknown')}</div>
        </div>
        <div class="playing-bars"><span></span><span></span><span></span></div>
        <div class="track-duration">${escHtml(t.duration_str || '')}</div>
      </div>
    `).join('');
  }

  // ── Playback ──────────────────────────────────────────────────────────────────
  function playTrack(index) {
    currentIndex = index;
    const track = tracks[index];
    audio.src = track.url;
    audio.play().catch(console.error);
    updateMiniPlayer(track);
    renderTrackList();
    logPlay(track);
  }

  function togglePlay() {
    if (audio.paused) audio.play().catch(console.error);
    else audio.pause();
  }

  function playNext() {
    if (!tracks.length) return;
    playTrack((currentIndex + 1) % tracks.length);
  }

  function playPrev() {
    if (!tracks.length) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    playTrack((currentIndex - 1 + tracks.length) % tracks.length);
  }

  // ── Mini Player UI ────────────────────────────────────────────────────────────
  function updateMiniPlayer(track) {
    document.getElementById('mini-player').classList.add('visible');
    document.getElementById('mini-title').textContent = track.title;
    document.getElementById('mini-artist').textContent = track.artist || 'unknown';
    const thumb = document.getElementById('mini-thumb');
    thumb.src = track.thumbnail || '';
    thumb.style.display = track.thumbnail ? 'block' : 'none';
  }

  audio.addEventListener('play', () => {
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = 'block';
  });
  audio.addEventListener('pause', () => {
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });
  audio.addEventListener('ended', playNext);

  // ── Analytics (localStorage) ──────────────────────────────────────────────────
  const STORAGE_KEY = 'musicapp_plays';

  function logPlay(track) {
    const plays = getPlays();
    plays.push({ id: track.id, title: track.title, artist: track.artist || 'unknown', ts: Date.now() });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plays)); } catch {}
  }

  function getPlays() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  }

  function getMonthStart() {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1).getTime();
  }

  function renderAnalytics() {
    const monthStart = getMonthStart();
    const plays = getPlays().filter(p => p.ts >= monthStart);

    document.getElementById('month-label').textContent =
      new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    document.getElementById('total-plays').textContent = plays.length;

    const counts = {};
    plays.forEach(p => {
      if (!counts[p.id]) counts[p.id] = { title: p.title, artist: p.artist, count: 0 };
      counts[p.id].count++;
    });

    const sorted = Object.values(counts).sort((a, b) => b.count - a.count);
    const max = sorted[0]?.count || 1;
    const chartList = document.getElementById('chart-list');

    if (!sorted.length) {
      chartList.innerHTML = `<div class="empty-analytics">no plays recorded yet<br>start listening to see your stats</div>`;
      return;
    }

    chartList.innerHTML = sorted.slice(0, 10).map((s, i) => `
      <div class="chart-bar-row">
        <div class="chart-rank">${i + 1}</div>
        <div class="chart-bar-wrap">
          <div class="chart-bar-label">${escHtml(s.title)}</div>
          <div class="chart-bar-track">
            <div class="chart-bar-fill" style="width:${Math.round((s.count / max) * 100)}%"></div>
          </div>
        </div>
        <div class="chart-count">${s.count}×</div>
      </div>
    `).join('');
  }

  // ── Util ──────────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  loadTracks();
</script>
</body>
</html>
